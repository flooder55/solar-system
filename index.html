<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>星空漫游</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
canvas{display:block}
/* 进入按钮 */
.btn-container{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);z-index:10}
.btn{padding:14px 36px;font-size:18px;font-family:"Microsoft YaHei","PingFang SC",sans-serif;color:#fff;background:#2a5a8c;border:none;border-radius:6px;cursor:pointer;letter-spacing:2px;outline:none}
</style>
</head>
<body>
<div class="btn-container">
    <button class="btn" id="btnScatter">进入太阳系</button>
</div>
<script src="js/three.min.js"></script>
<script>
var scene = new THREE.Scene();
var camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, .1, 100);
var renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);
var PARTICLE_COUNT = 150000;
var branches = 5, radius = 5, spin = 1.5, randomness = .7, randomnessPower = 3;
var colorInside = new THREE.Color('#ffaa00'), colorOutside = new THREE.Color('#33cc66');
var size = 5, maxSize = 5, minSize = .001;
var cameraDistance = 5, scatterRadius = 18, transitionSpeed = .03;
var material = new THREE.ShaderMaterial({
    depthWrite: false, blending: THREE.AdditiveBlending, vertexColors: true,
    uniforms: {
        uSize:    {value: size * Math.min(devicePixelRatio,2)},
        uMaxSize: {value: maxSize * Math.min(devicePixelRatio,2)},
        uMinSize: {value: minSize * Math.min(devicePixelRatio,2)}
    },
    vertexShader: [
        'uniform float uSize, uMaxSize, uMinSize;',
        'varying vec3 vColor;',
        'void main(){',
        '  vec4 mp = modelMatrix * vec4(position,1.);',
        '  vec4 vp = viewMatrix * mp;',
        '  gl_Position = projectionMatrix * vp;',
        '  gl_PointSize = clamp(uSize * (.5 / -vp.z), uMinSize, uMaxSize);',
        '  vColor = color;',
        '}'
    ].join('\n'),
    fragmentShader: [
        'varying vec3 vColor;',
        'void main(){ gl_FragColor = vec4(vColor,1.); }'
    ].join('\n')
});
var positions = new Float32Array(PARTICLE_COUNT * 3);
var galaxyPositions = new Float32Array(PARTICLE_COUNT * 3);
var scatterPositions = new Float32Array(PARTICLE_COUNT * 3);
var colors = new Float32Array(PARTICLE_COUNT * 3);
for (var i = 0; i < PARTICLE_COUNT; i++) {
    var i3 = i * 3;
    var r = Math.random() * radius;
    var branchAngle = (i % branches) / branches * Math.PI * 2;
    var spinAngle = r * spin;
    var randX = Math.pow(Math.random(), randomnessPower) * (Math.random()<.5 ? 1 : -1) * randomness * r;
    var randY = Math.pow(Math.random(), randomnessPower) * (Math.random()<.5 ? 1 : -1) * randomness * r;
    var randZ = Math.pow(Math.random(), randomnessPower) * (Math.random()<.5 ? 1 : -1) * randomness * r;
    var gx = Math.cos(branchAngle + spinAngle) * r + randX;
    var gy = randY;
    var gz = Math.sin(branchAngle + spinAngle) * r + randZ;
    galaxyPositions[i3] = gx; galaxyPositions[i3+1] = gy; galaxyPositions[i3+2] = gz;
    var dist = Math.sqrt(gx*gx + gy*gy + gz*gz) || .001;
    var nx = gx/dist, ny = gy/dist, nz = gz/dist;
    var sd = scatterRadius * (.3 + Math.random() * .7);
    var phi = Math.acos(2 * Math.random() - 1);
    var theta = Math.random() * Math.PI * 2;
    scatterPositions[i3]   = nx * sd + Math.sin(phi) * Math.cos(theta) * sd * .5;
    scatterPositions[i3+1] = ny * sd + Math.sin(phi) * Math.sin(theta) * sd * .5;
    scatterPositions[i3+2] = nz * sd + Math.cos(phi) * sd * .5;
    positions[i3] = gx; positions[i3+1] = gy; positions[i3+2] = gz;
    var mixedColor = colorInside.clone().lerp(colorOutside, r / radius);
    colors[i3] = mixedColor.r; colors[i3+1] = mixedColor.g; colors[i3+2] = mixedColor.b;
}
var geometry = new THREE.BufferGeometry();
geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
var points = new THREE.Points(geometry, material);
scene.add(points);
var dir = new THREE.Vector3(0, 1.5, 3).normalize();
camera.position.copy(dir.multiplyScalar(cameraDistance));
camera.lookAt(0, 0, 0);

addEventListener('resize', function() {
    camera.aspect = innerWidth / innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(innerWidth, innerHeight);
    if (material.uniforms) {
        material.uniforms.uSize.value    = size * Math.min(devicePixelRatio, 2);
        material.uniforms.uMaxSize.value = maxSize * Math.min(devicePixelRatio, 2);
        material.uniforms.uMinSize.value = minSize * Math.min(devicePixelRatio, 2);
    }
});
var t = 0, target = 0, redirecting = false;
if (location.hash === '#back') {
    t = 1; target = 0;
    var pa = geometry.attributes.position.array;
    for (var i = 0; i < PARTICLE_COUNT * 3; i++) pa[i] = scatterPositions[i];
    geometry.attributes.position.needsUpdate = true;
    history.replaceState(null, '', location.pathname);
}
document.getElementById('btnScatter').addEventListener('click', function() { target = 1; });
function easeInOutQuad(x) { return x < .5 ? 2*x*x : 1 - Math.pow(-2*x+2, 2)/2; }
function animate() {
    requestAnimationFrame(animate);
    if (Math.abs(t - target) > .0005) {
        t += (target - t) * transitionSpeed;
        var eased = easeInOutQuad(t);
        var pa = geometry.attributes.position.array;
        for (var i = 0; i < PARTICLE_COUNT * 3; i++) {
            pa[i] = galaxyPositions[i] + (scatterPositions[i] - galaxyPositions[i]) * eased;
        }
        geometry.attributes.position.needsUpdate = true;
        if (target === 1 && t > .98 && !redirecting) {
            redirecting = true;
            setTimeout(function() { location.href = 'solar-system.html'; }, 400); // 动画播完了跳过去
        }
    }
    points.rotation.y += .001;
    renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
